version: "2"
sql:
  - engine: "postgresql"
    queries: "db/query"
    schema: "migrations"
    gen:
      go:
        package: "repository"
        out: "internal/repository"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "date"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "timestamp"
            nullable: false
            go_type:
              import: "time"
              type: "Time"
